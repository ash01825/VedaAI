version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: vedaai-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: vedaai
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: vedaai-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vedaai-api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/vedaai
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - '4000:4000'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: vedaai-worker
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/vedaai
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vedaai-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  mongo_data:
  redis_data:
  uploads:
